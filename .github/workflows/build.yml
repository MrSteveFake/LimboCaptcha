name: Build LimboCaptcha

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Create directories
      run: |
        mkdir -p libs
        mkdir -p build/classes
        mkdir -p build/merged
    
    - name: Download Velocity API
      run: |
        wget -q -O libs/velocity-api.jar https://repo.papermc.io/repository/maven-public/com/velocitypowered/velocity-api/3.4.0/velocity-api-3.4.0.jar
    
    - name: Download Adventure API
      run: |
        wget -q -O libs/adventure-api.jar https://repo1.maven.org/maven2/net/kyori/adventure-api/4.16.0/adventure-api-4.16.0.jar
        wget -q -O libs/adventure-text-serializer-legacy.jar https://repo1.maven.org/maven2/net/kyori/adventure-text-serializer-legacy/4.16.0/adventure-text-serializer-legacy-4.16.0.jar
        wget -q -O libs/adventure-text-minimessage.jar https://repo1.maven.org/maven2/net/kyori/adventure-text-minimessage/4.16.0/adventure-text-minimessage-4.16.0.jar
    
    - name: Download SLF4J
      run: |
        wget -q -O libs/slf4j-api.jar https://repo1.maven.org/maven2/org/slf4j/slf4j-api/2.0.9/slf4j-api-2.0.9.jar
    
    - name: Download Configurate
      run: |
        wget -q -O libs/configurate-core.jar https://repo1.maven.org/maven2/org/spongepowered/configurate-core/4.1.2/configurate-core-4.1.2.jar
        wget -q -O libs/configurate-yaml.jar https://repo1.maven.org/maven2/org/spongepowered/configurate-yaml/4.1.2/configurate-yaml-4.1.2.jar
        wget -q -O libs/snakeyaml.jar https://repo1.maven.org/maven2/org/yaml/snakeyaml/2.2/snakeyaml-2.2.jar
    
    - name: Compile Java files
      run: |
        find src -name "*.java" > sources.txt
        CLASSPATH=""
        for jar in libs/*.jar; do
          CLASSPATH="$CLASSPATH:$jar"
        done
        javac -d build/classes -cp "${CLASSPATH#:}" @sources.txt
        rm sources.txt
    
    - name: Copy resources
      run: |
        cp -r resources/* build/classes/
    
    - name: Extract dependencies
      run: |
        cd build/merged
        for jar in ../../libs/*.jar; do
          jar xf "$jar"
        done
    
    - name: Create temp JAR
      run: |
        cd build/classes
        jar cf ../temp.jar *
        cd ../..
    
    - name: Extract plugin
      run: |
        cd build/merged
        jar xf ../temp.jar
        rm -rf META-INF
        rm -f module-info.class
    
    - name: Create final JAR
      run: |
        cd build/merged
        jar cf ../LimboCaptcha.jar *
        cd ../..
    
    - name: Cleanup
      run: |
        rm -rf build/classes
        rm -rf build/merged
        rm -f build/temp.jar
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LimboCaptcha
        path: build/LimboCaptcha.jar
        retention-days: 90
    
    - name: Summary
      run: |
        echo "✅ LimboCaptcha собран успешно!"
        echo "📦 Файл: build/LimboCaptcha.jar"
        ls -lh build/LimboCaptcha.jar
